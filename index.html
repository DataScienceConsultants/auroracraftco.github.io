<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Craft Co | Honey Rum</title>
  <meta name="description" content="Aurora Craft Co. Honey Rum is a honey-finished rum spirit formulated and made in Puerto Rico." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --black: #030303;
      --charcoal: #0b0b0a;
      --graphite: #161513;
      --smoke: #24221f;
      --gold: #c9a646;
      --soft-gold: #e2c873;
      --deep-gold: #8b6b24;
      --ivory: #f2eee3;
      --muted: #aaa293;
      --line: rgba(201, 166, 70, .22);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--black);
      color: var(--ivory);
      font-family: Inter, sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 74% 24%, rgba(201,166,70,.13), transparent 28%),
        radial-gradient(circle at 20% 88%, rgba(139,107,36,.12), transparent 30%),
        linear-gradient(135deg, #000 0%, #080807 48%, #12100c 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 100% 72px;
      opacity: .28;
      pointer-events: none;
    }

    .age-gate {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,.96);
      backdrop-filter: blur(18px);
    }

    .age-gate.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: .35s ease;
    }

    .age-card {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
      padding: 48px;
      text-align: center;
    }

    .age-card .mark {
      font-family: Cinzel, serif;
      color: var(--gold);
      letter-spacing: .22em;
      font-size: .82rem;
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    .age-card h1 {
      font-family: Cinzel, serif;
      font-weight: 500;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1;
      margin: 0 0 18px;
    }

    .age-card p {
      color: var(--muted);
      line-height: 1.75;
      margin: 0 auto 30px;
      max-width: 390px;
    }

    .age-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .site-frame {
      width: min(1500px, calc(100% - 48px));
      margin: 0 auto;
      border-left: 1px solid rgba(201,166,70,.11);
      border-right: 1px solid rgba(201,166,70,.11);
    }

    .topline {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      color: var(--gold);
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .topline span { color: rgba(242,238,227,.45); }

    header {
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.42);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(20px);
    }

    .brand {
      text-decoration: none;
      color: var(--gold);
      font-family: Cinzel, serif;
      letter-spacing: .12em;
      line-height: 1;
    }

    .brand strong {
      display: block;
      font-size: 2rem;
      font-weight: 600;
    }
